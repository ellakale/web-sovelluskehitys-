<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aktiv - Kirjautuminen</title>
  </head>

  <body>
    <h2>Aktiv - Käyttäjätili</h2>

    <h3>Luo käyttäjä</h3>

    <p>
      Luo uusi käyttäjätili, jotta voit kirjautua sisään ja tarkastella hyvinvointipäiväkirjan merkintojä.
    </p>


    <form class="registerForm">
      <label for="username">Käyttäjänimi</label>
      <input
        id="username"
        type="text"
        name="username"
        placeholder="Käyttäjänimi"
      />
      <label for="password">Salasana</label>
      <input
        id="password"
        type="password"
        name="password"
        placeholder="salasana"
      />
      <label for="email">Sähköposti</label>
      <input
        id="email"
        type="email"
        name="email"
        placeholder="sähköposti"
      />
      <input
        name="submit"
        type="submit"
        value="Luo käyttäjä"
        class="postuser"
      />
    </form>

    <hr />

    <h3>Kirjaudu</h3>

    <p>Kirjaudu sisään nähdäksesi omat hyvinvointimerkintäsi.</p>

    <div>
      <form class="loginForm">
        <label for="login-username">Käyttäjänimi</label>
        <input
          id="login-username"
          type="text"
          name="username"
          placeholder="käyttäjänimi"
        />

        <label for="login-password">Salasana</label>
        <input
          id="login-password"
          type="password"
          name="password"
          placeholder="salasana"
        />

        <input
          name="submit"
          type="submit"
          value="Kirjaudu"
          class="loginform"
        />
      </form>

      <br />
      <div id="loginResponse"></div>
    </div>
  </body>

  <script type="module" src="/src/js/login.js"></script>
</html>
